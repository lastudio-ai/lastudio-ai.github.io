<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OmniVoice (k2-fsa/OmniVoice) - LA Studio Model Catalog</title>
    <meta name="description" content="High quality multilingual TTS & voice cloning - A quality-first local speech model family for multilingual text to speech, prompt conditioning, and zero-shot vo">
    <link rel="stylesheet" href="../../../styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../../../" aria-label="LA Studio home">
        <span class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span>LA Studio</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="active" href="../../../">Models</a>
        <a href="https://github.com/lastudio-ai" rel="noreferrer">GitHub</a>
        <a href="https://github.com/dduongtrandai/LA-Studio" rel="noreferrer">Source</a>
      </nav>
      <a class="download-link" href="https://github.com/dduongtrandai/LA-Studio/releases" rel="noreferrer">
        <span aria-hidden="true">↓</span>
        Releases
      </a>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="mascot" aria-hidden="true">
          <span class="mascot-core">LA</span>
          <span class="signal signal-a"></span>
          <span class="signal signal-b"></span>
          <span class="signal signal-c"></span>
        </div>
        <h1 id="page-title">Model Catalog</h1>
        <p>Curated local models for speech generation, voice cloning, voice design, and speech recognition.</p>
      </section>

      <section class="catalog-shell" aria-label="Model catalog">
        <div class="catalog-main-layout">
          <div class="catalog-left-pane">
            <div class="catalog-toolbar">
              <div class="search-box">
                <label for="model-search">Search</label>
                <input id="model-search" type="search" placeholder="Search models, tags, languages..." autocomplete="off">
              </div>

              <fieldset class="capability-filter">
                <legend>Model capabilities</legend>
                <label class="capability-chip">
                  <input type="checkbox" value="tts" checked>
                  <span class="icon icon-tts" aria-hidden="true">T</span>
                  TTS
                </label>
                <label class="capability-chip">
                  <input type="checkbox" value="voice-cloning" checked>
                  <span class="icon icon-clone" aria-hidden="true">C</span>
                  Cloning
                </label>
                <label class="capability-chip">
                  <input type="checkbox" value="voice-design" checked>
                  <span class="icon icon-design" aria-hidden="true">D</span>
                  Design
                </label>
                <label class="capability-chip">
                  <input type="checkbox" value="stt" checked>
                  <span class="icon icon-stt" aria-hidden="true">S</span>
                  STT
                </label>
              </fieldset>

              <div class="sort-box">
                <label for="sort-models">Sort</label>
                <select id="sort-models">
                  <option value="featured">Featured</option>
                  <option value="name">Name</option>
                  <option value="parameters">Parameters</option>
                  <option value="files">Files</option>
                </select>
              </div>
            </div>

            <div class="summary-row" aria-live="polite">
              <span id="result-count">Loading models...</span>
              <span id="catalog-version"></span>
            </div>

            <div id="model-list" class="model-list"></div>
            <p id="empty-state" class="empty-state" hidden>No models match the current filters.</p>
          </div>

          <aside id="model-detail-pane" class="model-detail-pane" hidden></aside>
        </div>
      </section>

      <section id="model-page-layout" class="model-page-layout" hidden></section>
    </main>

    <template id="model-detail-template">
      <div class="detail-container">
        <header class="detail-header">
          <div class="detail-header-left">
            <span class="detail-icon" aria-hidden="true">🤖</span>
            <h2 class="detail-title"></h2>
            <button class="copy-id-btn" title="Copy model ID">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
          <button class="close-detail-btn" aria-label="Close details">&times;</button>
        </header>

        <div class="detail-scrollable">
          <div class="detail-stats-row">
            <span class="stat-item downloads-stat"></span>
            <span class="stat-item likes-stat"></span>
            <span class="stat-item updated-stat"></span>
            <span class="staff-pick-badge">Staff Pick</span>
          </div>

          <div class="detail-description-box">
            <p class="detail-desc"></p>
          </div>

          <div class="detail-meta-chips">
            <span class="meta-chip params-chip"></span>
            <span class="meta-chip arch-chip"></span>
            <span class="meta-chip format-chip">GGUF</span>
          </div>

          <div class="detail-capabilities-row">
            <label class="detail-label">Capabilities:</label>
            <div class="detail-capabilities-list"></div>
          </div>

          <section class="detail-download-box">
            <h3>Download Options</h3>
            <div class="download-selector-wrapper">
              <select class="variant-select"></select>
            </div>
            <div class="download-action-row">
              <span class="fit-indicator">✓ Likely Fit</span>
              <a class="download-action-btn" target="_blank" rel="noopener noreferrer">Download</a>
            </div>
          </section>

          <section class="detail-readme-box">
            <h3>README</h3>
            <div class="readme-content"></div>
          </section>
        </div>
      </div>
    </template>

    <template id="model-card-template">
      <article class="model-card">
        <div class="model-topline">
          <div>
            <h2></h2>
            <p class="model-id"></p>
          </div>
          <div class="capability-icons"></div>
        </div>
        <p class="description"></p>
        <div class="meta-grid"></div>
        <div class="tag-row"></div>
        <details class="files-panel">
          <summary>Files and variants</summary>
          <div class="files-list"></div>
        </details>
        <div class="card-footer">
          <a class="repo-link" rel="noreferrer">Open model</a>
          <span class="updated-label"></span>
        </div>
      </article>
    </template>

    <script>
      window.catalogUrl = "../../../data/catalog.json";
      window.initialModelId = "k2-fsa/OmniVoice";
    </script>
    <script src="../../../app.js"></script>
  </body>
</html>
